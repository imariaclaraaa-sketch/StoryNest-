// create 6 questions
while(words.length < 6){
words.push({...words[words.length % 5]});
}


let index=0;
let score=0;
let answered=[];


function shuffle(arr){
return [...arr].sort(()=>Math.random()-0.5);
}



function load(){


let q=words[index];


question.innerText=
"What does "+q.w+" mean?";


progress.innerText=
(index+1)+"/6";


answers.innerHTML="";



shuffle([q.c,...q.x]).forEach(text=>{


let btn=document.createElement("button");

btn.className="answer";

btn.innerText=text;



btn.onclick=function(){


if(answered[index])return;


answered[index]=true;


document.querySelectorAll(".answer").forEach(b=>{
b.disabled=true;
});



if(text==q.c){

btn.classList.add("correct");

score++;

scoreEl.innerText=score;


}else{


btn.classList.add("wrong");


document.querySelectorAll(".answer").forEach(b=>{

if(b.innerText==q.c)
b.classList.add("correct");

});


}


};



answers.appendChild(btn);


});


}



function next(){

if(index<19){

index++;

load();

}

}



function previous(){

if(index>0){

index--;

load();

}

}



function learn(){

learnText.innerHTML=
words[index].learn;

learnBox.style.display="block";

}



function closeLearn(){

learnBox.style.display="none";

}



function showIPA(){

ipaText.innerText=
words[index].ipa;

ipaBox.style.display="block";

}



function closeIPA(){

}



function playAudio(){

new SpeechSynthesisUtterance(words[index].w);

speech.lang="en-US";
speech.rate=0.8;

speechSynthesis.speak(speech);

}
